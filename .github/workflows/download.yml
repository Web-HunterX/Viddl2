name: Download from PimpBunny and Split to 80MB Parts

on:
  workflow_dispatch:
    inputs:
      artist_url:
        description: 'لینک صفحه آرتیست (مثلاً https://pimpbunny.com/onlyfans-models/xxx/)'
        required: true
        type: string
      output_name:
        description: 'نام فایل خروجی نهایی'
        required: false
        default: 'video_output'
        type: string

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
    
    - name: Checkout PimpBunny tool
      uses: actions/checkout@v4
      with:
        repository: phoenixthrush/PimpBunny
        path: ./PimpBunny-tool
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install PimpBunny dependencies
      run: |
        cd ./PimpBunny-tool
        pip install -r requirements.txt
        pip install niquests patchright
        playwright install chromium  # برای Patchright
    
    - name: Configure artist URL
      run: |
        cd ./PimpBunny-tool
        echo "${{ github.event.inputs.artist_url }}" > artists.txt
        echo "✅ artists.txt created with: ${{ github.event.inputs.artist_url }}"
    
    - name: Run PimpBunny downloader
      run: |
        cd ./PimpBunny-tool
        python main.py
        echo "✅ Download completed"
    
    - name: Find downloaded video
      run: |
        # پیدا کردن فایل MP3 یا MP4 دانلود شده
        cd ./PimpBunny-tool
        VIDEO_FILE=$(find ./artists -name "*.mp4" -o -name "*.mp3" | head -1)
        
        if [ -n "$VIDEO_FILE" ]; then
          echo "✅ Video found: $VIDEO_FILE"
          cp "$VIDEO_FILE" ../"${{ github.event.inputs.output_name }}.mp4"
          echo "VIDEO_PATH=${{ github.event.inputs.output_name }}.mp4" >> $GITHUB_ENV
        else
          echo "❌ No video file found!"
          ls -la ./artists/
          exit 1
        fi
    
    - name: Split video into 80MB password-protected ZIP parts
      run: |
        python split_and_zip.py "$VIDEO_PATH" 80 "mkml00"
    
    - name: Move to flt folder
      run: |
        mkdir -p flt
        mv *.zip *.zip.* *.txt flt/ 2>/dev/null || true
        ls -lah flt/
    
    - name: Upload to repository as artifact
      uses: actions/upload-artifact@v4
      with:
        name: flt-parts
        path: flt/
        retention-days: 7
    
    - name: Commit and push to repository
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add flt/
        git commit -m "Add split video parts (80MB, password: mkml00) [skip ci]" || echo "Nothing to commit"
        git push
